<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sou'West Strummers TV Song Viewer</title>
  <style>
    :root {
      --bg: #f7f5ee;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #64748b;
      --brand: #00625f;
      --brand-2: #0f766e;
      --border: #d9e2ec;
      --danger: #b42318;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body.tv-mode { overflow: hidden; }
    button, select, input { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 360px 1fr; }
    .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 18px; overflow: auto; box-shadow: 10px 0 32px rgba(15,23,42,.08); z-index: 4; }
    .brand { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .logo { width: 46px; height: 46px; border-radius: 14px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 22px; }
    h1 { font-size: 22px; margin: 0; line-height: 1.1; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .viewer { height: 100vh; overflow: auto; padding: 28px; scroll-behavior: auto; background: radial-gradient(circle at top, #ffffff 0, #f7f5ee 48%, #ede7d8 100%); }
    #pdfWrap { max-width: 1500px; margin: 0 auto 50vh; display: grid; gap: 24px; justify-items: center; }
    .pageShell { background: #fff; box-shadow: var(--shadow); border-radius: 8px; padding: 0; overflow: hidden; }
    canvas.pdfPage { display: block; max-width: none; }
    .controls { display: grid; gap: 10px; margin: 16px 0; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .btn { border: 0; background: var(--brand); color: #fff; border-radius: 12px; padding: 12px 14px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(0,98,95,.18); }
    .btn:hover { background: var(--brand-2); }
    .btn.secondary { background: #e6f4f1; color: var(--brand); box-shadow: none; }
    .btn.ghost { background: #f1f5f9; color: #334155; box-shadow: none; }
    .btn.danger { background: #fee4e2; color: var(--danger); box-shadow: none; }
    .btn.big { font-size: 20px; padding: 18px; }
    select, input[type="search"], input[type="range"] { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; background: #fff; color: var(--text); }
    label { font-size: 13px; color: var(--muted); font-weight: 700; display: block; margin: 12px 0 6px; }
    .pill { display: inline-flex; align-items: center; gap: 8px; background: #f1f5f9; border: 1px solid var(--border); border-radius: 999px; padding: 8px 10px; color: var(--muted); font-size: 13px; }
    .status { margin-top: 12px; padding: 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 14px; font-size: 13px; color: var(--muted); white-space: pre-wrap; }
    .error { color: var(--danger); background: #fff1f0; border-color: #fecdca; }
    .songList { display: grid; gap: 7px; margin-top: 12px; max-height: 35vh; overflow: auto; padding-right: 4px; }
    .songItem { text-align: left; border: 1px solid var(--border); background: #fff; border-radius: 12px; padding: 10px; cursor: pointer; color: var(--text); }
    .songItem.active { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0,98,95,.12); }
    .remoteBox { border: 1px solid var(--border); border-radius: 18px; padding: 14px; background: #fbfdfc; margin-top: 14px; }
    .qr { width: 210px; height: 210px; display: block; margin: 10px auto; border: 10px solid #fff; border-radius: 12px; box-shadow: 0 6px 18px rgba(15,23,42,.12); }
    .remoteUrl { overflow-wrap: anywhere; font-size: 12px; color: var(--muted); }
    .topbar { position: fixed; top: 14px; right: 18px; z-index: 5; display: flex; gap: 8px; align-items: center; }
    .songTitle { background: rgba(255,255,255,.94); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 999px; padding: 10px 14px; color: var(--text); font-weight: 800; max-width: min(60vw, 900px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .remoteOnly { min-height: 100vh; display: grid; place-items: center; padding: 20px; background: var(--bg); }
    .remotePanel { width: min(520px, 100%); background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 20px; box-shadow: var(--shadow); }
    .remoteGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .remoteGrid .wide { grid-column: 1 / -1; }
    .remotePanel h1 { font-size: 28px; }
    .fallback { max-width: 860px; margin: 70px auto; background: rgba(255,255,255,.92); border: 1px solid var(--border); border-radius: 22px; padding: 24px; box-shadow: var(--shadow); }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; max-height: none; border-right: 0; border-bottom: 1px solid var(--border); }
      .viewer { height: auto; min-height: 60vh; }
      .topbar { position: sticky; top: 0; right: auto; justify-content: center; padding: 8px; background: rgba(247,245,238,.92); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    'use strict';

    const CONFIG = {
      siteOrigin: window.location.origin,
      songsDataPath: '/assets/songs-data.js',
      pdfFolder: '/pdfs/',
      defaultZoom: 1.55,
      minZoom: 0.8,
      maxZoom: 3.2,
      defaultSpeed: 0.55,
      qrSize: 220
    };

    const state = {
      songs: [],
      currentIndex: 0,
      pdf: null,
      zoom: Number(localStorage.getItem('tvZoom') || CONFIG.defaultZoom),
      speed: Number(localStorage.getItem('tvSpeed') || CONFIG.defaultSpeed),
      playing: false,
      renderToken: 0,
      scrollTimer: null,
      peer: null,
      conn: null,
      peerId: '',
      isRemote: new URLSearchParams(location.search).has('remote'),
      remoteTarget: new URLSearchParams(location.search).get('remote') || ''
    };

    function el(id) { return document.getElementById(id); }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    function absUrl(path) { return new URL(path, CONFIG.siteOrigin).href; }
    function cleanTitle(value) {
      return String(value || '')
        .replace(/\.pdf(\?.*)?$/i, '')
        .replace(/^\/+pdfs\//i, '')
        .replace(/^\d+[-_.\s]*/, '')
        .replace(/[-_]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase()) || 'Untitled song';
    }
    function setStatus(message, isError) {
      const box = el('status');
      if (!box) return;
      box.textContent = message;
      box.className = 'status' + (isError ? ' error' : '');
    }
    function saveSettings() {
      localStorage.setItem('tvZoom', String(state.zoom));
      localStorage.setItem('tvSpeed', String(state.speed));
    }

    function renderShell() {
      if (state.isRemote) {
        document.body.className = '';
        document.getElementById('root').innerHTML = `
          <main class="remoteOnly">
            <section class="remotePanel">
              <div class="brand">
                <div class="logo">S</div>
                <div>
                  <h1>TV Remote</h1>
                  <div class="sub">Sou'West Strummers song viewer</div>
                </div>
              </div>
              <div id="remoteStatus" class="status">Connecting to TV...</div>
              <div class="remoteGrid">
                <button class="btn big wide" data-cmd="toggle">Play / Pause</button>
                <button class="btn secondary" data-cmd="restart">Restart</button>
                <button class="btn secondary" data-cmd="fullscreen">Fullscreen</button>
                <button class="btn ghost" data-cmd="prev">Previous</button>
                <button class="btn ghost" data-cmd="next">Next</button>
                <button class="btn ghost" data-cmd="zoomOut">Zoom -</button>
                <button class="btn ghost" data-cmd="zoomIn">Zoom +</button>
                <button class="btn ghost" data-cmd="slower">Slower</button>
                <button class="btn ghost" data-cmd="faster">Faster</button>
              </div>
            </section>
          </main>`;
        document.querySelectorAll('[data-cmd]').forEach(btn => {
          btn.addEventListener('click', () => sendRemote(btn.dataset.cmd));
        });
        return;
      }

      document.body.className = 'tv-mode';
      document.getElementById('root').innerHTML = `
        <div class="app">
          <aside class="sidebar">
            <div class="brand">
              <div class="logo">S</div>
              <div>
                <h1>TV Song Viewer</h1>
                <div class="sub">Sou'West Strummers</div>
              </div>
            </div>

            <div class="controls">
              <button id="playBtn" class="btn big">Start auto-scroll</button>
              <div class="row3">
                <button id="prevBtn" class="btn ghost">Prev</button>
                <button id="restartBtn" class="btn ghost">Top</button>
                <button id="nextBtn" class="btn ghost">Next</button>
              </div>
              <button id="fullBtn" class="btn secondary">Fullscreen</button>
            </div>

            <label for="songSelect">Song</label>
            <select id="songSelect"><option>Loading songs...</option></select>

            <label for="searchBox">Search</label>
            <input id="searchBox" type="search" placeholder="Search songs" />
            <div id="songList" class="songList"></div>

            <label for="zoomRange">Zoom <span id="zoomText"></span></label>
            <input id="zoomRange" type="range" min="80" max="320" step="5" />

            <label for="speedRange">Scroll speed <span id="speedText"></span></label>
            <input id="speedRange" type="range" min="10" max="200" step="5" />

            <div class="remoteBox">
              <strong>Phone remote</strong>
              <div class="sub">Scan this on your phone while this page is open on the TV.</div>
              <img id="qrImg" class="qr" alt="Remote QR code" />
              <div id="remoteUrl" class="remoteUrl"></div>
              <div id="remoteState" class="pill">Remote starting...</div>
            </div>

            <div id="status" class="status">Starting...</div>
          </aside>

          <main id="viewer" class="viewer">
            <div class="topbar"><div id="titlePill" class="songTitle">Loading songs...</div></div>
            <div id="pdfWrap">
              <div class="fallback">
                <h2>Loading song list...</h2>
                <p>This page reads <code>/assets/songs-data.js</code> and extracts the PDF files from <code>/pdfs/</code>.</p>
              </div>
            </div>
          </main>
        </div>`;

      el('playBtn').addEventListener('click', togglePlay);
      el('prevBtn').addEventListener('click', previousSong);
      el('nextBtn').addEventListener('click', nextSong);
      el('restartBtn').addEventListener('click', restartSong);
      el('fullBtn').addEventListener('click', goFullscreen);
      el('songSelect').addEventListener('change', e => loadSong(Number(e.target.value)));
      el('searchBox').addEventListener('input', renderSongList);
      el('zoomRange').addEventListener('input', e => setZoom(Number(e.target.value) / 100));
      el('speedRange').addEventListener('input', e => setSpeed(Number(e.target.value) / 100));
      updateControlText();
    }

    async function loadSongsFromDataFile() {
      setStatus('Loading /assets/songs-data.js ...', false);
      const url = CONFIG.songsDataPath + '?v=' + Date.now();
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error('Could not load ' + CONFIG.songsDataPath + ' (' + response.status + ')');
      const text = await response.text();

      const songs = [];
      const seen = new Set();

      function addSong(pdfPath, title) {
        if (!pdfPath) return;
        let normalized = String(pdfPath).trim().replace(/^['"]|['"]$/g, '');
        if (!/\.pdf(\?|$)/i.test(normalized)) return;
        if (!normalized.startsWith('http') && !normalized.startsWith('/')) normalized = CONFIG.pdfFolder + normalized.replace(/^\/+/, '');
        const full = absUrl(normalized);
        if (seen.has(full)) return;
        seen.add(full);
        songs.push({ title: cleanTitle(title || normalized), url: full, path: normalized });
      }

      // 1) Prefer object-style entries where title/name/song appears near the PDF field.
      const objectRegex = /\{[^{}]*?\}/gs;
      let objectMatch;
      while ((objectMatch = objectRegex.exec(text)) !== null) {
        const obj = objectMatch[0];
        const pdfMatch = obj.match(/['"]([^'"]*\/pdfs\/[^'"]+\.pdf(?:\?[^'"]*)?|[^'"]+\.pdf(?:\?[^'"]*)?)['"]/i);
        if (!pdfMatch) continue;
        const titleMatch = obj.match(/(?:title|name|song|label)\s*:\s*['"]([^'"]+)['"]/i);
        addSong(pdfMatch[1], titleMatch ? titleMatch[1] : '');
      }

      // 2) Fallback: find every quoted PDF path anywhere in the JS file.
      const pdfRegex = /['"]([^'"]*(?:\/pdfs\/|pdfs\/)[^'"]+\.pdf(?:\?[^'"]*)?|[^'"]+\.pdf(?:\?[^'"]*)?)['"]/gi;
      let match;
      while ((match = pdfRegex.exec(text)) !== null) {
        addSong(match[1], '');
      }

      if (!songs.length) {
        throw new Error('Loaded /assets/songs-data.js, but could not find any .pdf entries. Check the data file contains /pdfs/...pdf or filename.pdf values.');
      }

      songs.sort((a, b) => {
        const na = Number((a.title.match(/^\d+/) || [99999])[0]);
        const nb = Number((b.title.match(/^\d+/) || [99999])[0]);
        if (na !== nb) return na - nb;
        return a.title.localeCompare(b.title);
      });

      state.songs = songs;
      setStatus('Loaded ' + songs.length + ' songs from /assets/songs-data.js', false);
    }

    function renderSongControls() {
      const select = el('songSelect');
      select.innerHTML = '';
      state.songs.forEach((song, index) => {
        const opt = document.createElement('option');
        opt.value = String(index);
        opt.textContent = song.title;
        select.appendChild(opt);
      });
      renderSongList();
    }

    function renderSongList() {
      const list = el('songList');
      const q = (el('searchBox').value || '').toLowerCase().trim();
      list.innerHTML = '';
      state.songs.forEach((song, index) => {
        if (q && !song.title.toLowerCase().includes(q)) return;
        const btn = document.createElement('button');
        btn.className = 'songItem' + (index === state.currentIndex ? ' active' : '');
        btn.textContent = song.title;
        btn.addEventListener('click', () => loadSong(index));
        list.appendChild(btn);
      });
    }

    async function loadSong(index) {
      if (!state.songs.length) return;
      state.currentIndex = clamp(index, 0, state.songs.length - 1);
      const song = state.songs[state.currentIndex];
      state.renderToken++;
      const token = state.renderToken;
      stopScroll();
      el('songSelect').value = String(state.currentIndex);
      el('titlePill').textContent = song.title;
      renderSongList();
      const wrap = el('pdfWrap');
      wrap.innerHTML = '<div class="fallback"><h2>Loading PDF...</h2><p>' + escapeHtml(song.title) + '</p></div>';
      try {
        setStatus('Loading PDF: ' + song.title, false);
        const pdf = await pdfjsLib.getDocument(song.url).promise;
        if (token !== state.renderToken) return;
        state.pdf = pdf;
        wrap.innerHTML = '';
        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
          if (token !== state.renderToken) return;
          const page = await pdf.getPage(pageNumber);
          const viewport = page.getViewport({ scale: state.zoom });
          const canvas = document.createElement('canvas');
          canvas.className = 'pdfPage';
          const context = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          const shell = document.createElement('div');
          shell.className = 'pageShell';
          shell.appendChild(canvas);
          wrap.appendChild(shell);
          await page.render({ canvasContext: context, viewport }).promise;
        }
        el('viewer').scrollTop = 0;
        setStatus('Ready: ' + song.title + '\nPages: ' + pdf.numPages, false);
      } catch (err) {
        wrap.innerHTML = '<div class="fallback"><h2>Could not load PDF</h2><p>' + escapeHtml(song.title) + '</p><p>' + escapeHtml(err.message) + '</p></div>';
        setStatus('PDF error: ' + err.message, true);
      }
    }

    function updateControlText() {
      const zoomRange = el('zoomRange');
      const speedRange = el('speedRange');
      if (zoomRange) zoomRange.value = String(Math.round(state.zoom * 100));
      if (speedRange) speedRange.value = String(Math.round(state.speed * 100));
      if (el('zoomText')) el('zoomText').textContent = Math.round(state.zoom * 100) + '%';
      if (el('speedText')) el('speedText').textContent = Math.round(state.speed * 100) + '%';
      if (el('playBtn')) el('playBtn').textContent = state.playing ? 'Pause auto-scroll' : 'Start auto-scroll';
      saveSettings();
    }

    function setZoom(value) {
      state.zoom = clamp(value, CONFIG.minZoom, CONFIG.maxZoom);
      updateControlText();
      loadSong(state.currentIndex);
    }
    function setSpeed(value) {
      state.speed = clamp(value, 0.1, 2);
      updateControlText();
    }
    function startScroll() {
      if (state.scrollTimer) return;
      state.playing = true;
      updateControlText();
      state.scrollTimer = window.setInterval(() => {
        const viewer = el('viewer');
        if (!viewer) return;
        const max = viewer.scrollHeight - viewer.clientHeight;
        if (viewer.scrollTop >= max - 2) {
          stopScroll();
          return;
        }
        viewer.scrollTop += state.speed;
      }, 16);
    }
    function stopScroll() {
      state.playing = false;
      if (state.scrollTimer) window.clearInterval(state.scrollTimer);
      state.scrollTimer = null;
      updateControlText();
    }
    function togglePlay() { state.playing ? stopScroll() : startScroll(); }
    function restartSong() { stopScroll(); el('viewer').scrollTop = 0; }
    function nextSong() { loadSong((state.currentIndex + 1) % state.songs.length); }
    function previousSong() { loadSong((state.currentIndex - 1 + state.songs.length) % state.songs.length); }
    function goFullscreen() {
      const target = document.documentElement;
      if (!document.fullscreenElement && target.requestFullscreen) target.requestFullscreen().catch(() => {});
    }

    function setupPdfJs() {
      if (!window.pdfjsLib) throw new Error('PDF.js did not load. Check internet access or CDN blocking.');
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    function setupRemoteTv() {
      if (!window.Peer) {
        el('remoteState').textContent = 'Remote unavailable: PeerJS did not load';
        makeQr(location.href);
        return;
      }
      const peer = new Peer(undefined, { debug: 1 });
      state.peer = peer;
      peer.on('open', id => {
        state.peerId = id;
        const remoteUrl = location.origin + location.pathname + '?remote=' + encodeURIComponent(id);
        el('remoteUrl').textContent = remoteUrl;
        el('remoteState').textContent = 'Remote ready';
        makeQr(remoteUrl);
      });
      peer.on('connection', conn => {
        state.conn = conn;
        el('remoteState').textContent = 'Remote connected';
        conn.on('data', data => handleCommand(data && data.cmd));
        conn.on('close', () => { el('remoteState').textContent = 'Remote disconnected'; });
      });
      peer.on('error', err => {
        el('remoteState').textContent = 'Remote error: ' + err.type;
        makeQr(location.href);
      });
    }

    function makeQr(url) {
      const img = el('qrImg');
      if (!img) return;
      const encoded = encodeURIComponent(url);
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + CONFIG.qrSize + 'x' + CONFIG.qrSize + '&data=' + encoded;
      img.onerror = () => {
        img.style.display = 'none';
        const remoteUrl = el('remoteUrl');
        if (remoteUrl) remoteUrl.textContent = 'QR failed to load. Open this on your phone: ' + url;
      };
    }

    function setupRemotePhone() {
      const status = el('remoteStatus');
      if (!window.Peer) {
        status.textContent = 'Remote unavailable: PeerJS did not load.';
        status.className = 'status error';
        return;
      }
      const peer = new Peer(undefined, { debug: 1 });
      state.peer = peer;
      peer.on('open', () => {
        const conn = peer.connect(state.remoteTarget, { reliable: true });
        state.conn = conn;
        conn.on('open', () => { status.textContent = 'Connected to TV'; status.className = 'status'; });
        conn.on('close', () => { status.textContent = 'Disconnected from TV'; status.className = 'status error'; });
        conn.on('error', err => { status.textContent = 'Remote error: ' + err.message; status.className = 'status error'; });
      });
      peer.on('error', err => { status.textContent = 'Connection error: ' + err.type; status.className = 'status error'; });
    }

    function sendRemote(cmd) {
      if (state.conn && state.conn.open) state.conn.send({ cmd });
      const status = el('remoteStatus');
      if (status && (!state.conn || !state.conn.open)) {
        status.textContent = 'Not connected yet. Rescan the QR code or reload this remote page.';
        status.className = 'status error';
      }
    }

    function handleCommand(cmd) {
      switch (cmd) {
        case 'toggle': togglePlay(); break;
        case 'restart': restartSong(); break;
        case 'next': nextSong(); break;
        case 'prev': previousSong(); break;
        case 'zoomIn': setZoom(state.zoom + 0.1); break;
        case 'zoomOut': setZoom(state.zoom - 0.1); break;
        case 'faster': setSpeed(state.speed + 0.1); break;
        case 'slower': setSpeed(state.speed - 0.1); break;
        case 'fullscreen': goFullscreen(); break;
        default: break;
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    async function init() {
      renderShell();
      if (state.isRemote) {
        setupRemotePhone();
        return;
      }
      try {
        setupPdfJs();
        setupRemoteTv();
        await loadSongsFromDataFile();
        renderSongControls();
        await loadSong(0);
      } catch (err) {
        setStatus(err.message, true);
        const wrap = el('pdfWrap');
        if (wrap) {
          wrap.innerHTML = '<div class="fallback"><h2>Song viewer error</h2><p>' + escapeHtml(err.message) + '</p><p>Expected data source: <code>/assets/songs-data.js</code></p><p>Expected PDFs: <code>/pdfs/*.pdf</code></p></div>';
        }
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
