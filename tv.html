<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sou'West Strummers TV Songs</title>
  <meta name="theme-color" content="#00625f" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --green: #00625f;
      --bg: #f4f7f6;
      --card: #ffffff;
      --text: #163332;
      --muted: #5f706f;
      --border: #d8e2e0;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    body.remote-mode { background: #fff; }
    button, select, input { font: inherit; }
    .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 18px; position: sticky; top: 0; height: 100vh; overflow: auto; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .logo { width: 42px; height: 42px; border-radius: 12px; background: var(--green); color: white; display: grid; place-items: center; font-weight: 800; }
    h1 { font-size: 22px; margin: 0; line-height: 1.1; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .panel { border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin: 12px 0; background: #fff; }
    .controls { display: grid; gap: 8px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn { border: 0; background: var(--green); color: white; border-radius: 10px; padding: 10px 12px; cursor: pointer; font-weight: 700; }
    .btn.secondary { background: #e9f2f1; color: var(--text); }
    .btn.danger { background: var(--danger); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    select, input[type="range"], input[type="search"] { width: 100%; }
    input[type="search"], select { border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: #fff; color: var(--text); }
    label { font-size: 13px; color: var(--muted); font-weight: 700; display: block; margin: 8px 0 5px; }
    .viewer { min-height: 100vh; overflow: auto; scroll-behavior: auto; padding: 28px; }
    .pdf-pages { width: fit-content; margin: 0 auto; }
    canvas.pdf-page { display: block; background: #fff; margin: 0 auto 24px; box-shadow: 0 7px 24px rgba(0,0,0,.18); border-radius: 4px; }
    .status { font-size: 13px; color: var(--muted); line-height: 1.4; }
    .error { color: var(--danger); background: #fff1f0; border: 1px solid #ffd5d0; border-radius: 12px; padding: 10px; font-size: 13px; white-space: pre-wrap; }
    #qr { display: grid; place-items: center; min-height: 150px; }
    #qr canvas, #qr img { width: 144px !important; height: 144px !important; }
    .remote { max-width: 520px; margin: 0 auto; padding: 18px; min-height: 100vh; background: #fff; }
    .remote h1 { font-size: 26px; margin-bottom: 6px; }
    .remote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .remote-grid .btn { font-size: 18px; padding: 16px 12px; }
    .remote-grid .wide { grid-column: 1 / -1; }
    .hide { display: none !important; }
    @media (max-width: 900px) { .app { grid-template-columns: 1fr; } .sidebar { position: static; height: auto; } .viewer { padding: 14px; } }
    @media (min-width: 1600px) { .sidebar { width: 420px; } .app { grid-template-columns: 420px 1fr; } h1 { font-size: 26px; } }
  </style>
</head>
<body>
  <div id="tvApp" class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">SW</div>
        <div>
          <h1>TV Song Viewer</h1>
          <div class="sub">Sou'West Strummers</div>
        </div>
      </div>

      <div id="errorBox" class="error hide"></div>

      <div class="panel controls">
        <label for="songSearch">Search songs</label>
        <input id="songSearch" type="search" placeholder="Search song title..." />
        <label for="songSelect">Song</label>
        <select id="songSelect"></select>
        <div class="row">
          <button class="btn" id="loadBtn">Load</button>
          <button class="btn secondary" id="refreshBtn">Refresh songs</button>
        </div>
      </div>

      <div class="panel controls">
        <div class="row">
          <button class="btn" id="playBtn">Start scroll</button>
          <button class="btn secondary" id="topBtn">Top</button>
          <button class="btn secondary" id="fullBtn">Fullscreen</button>
        </div>
        <label for="zoomRange">Zoom: <span id="zoomLabel">180%</span></label>
        <input id="zoomRange" type="range" min="90" max="320" step="10" value="180" />
        <label for="speedRange">Scroll speed: <span id="speedLabel">1.0</span></label>
        <input id="speedRange" type="range" min="0.2" max="5" step="0.1" value="1" />
      </div>

      <div class="panel">
        <strong>Phone Remote</strong>
        <div class="status">Scan this QR code with your phone. The remote works through the internet using BroadcastChannel when on the same browser profile, or URL commands as a fallback.</div>
        <div id="qr"></div>
        <div class="status" id="remoteUrlText"></div>
      </div>

      <div class="panel status" id="statusBox">Loading song list...</div>
    </aside>

    <main id="viewer" class="viewer">
      <div id="pages" class="pdf-pages"></div>
    </main>
  </div>

  <div id="remoteApp" class="remote hide">
    <h1>Song Remote</h1>
    <div class="sub">Open the TV page first, then use these controls.</div>
    <div class="remote-grid">
      <button class="btn wide" data-cmd="toggle">Play / Pause</button>
      <button class="btn secondary" data-cmd="top">Top</button>
      <button class="btn secondary" data-cmd="fullscreen">Fullscreen</button>
      <button class="btn secondary" data-cmd="prev">Previous song</button>
      <button class="btn secondary" data-cmd="next">Next song</button>
      <button class="btn secondary" data-cmd="zoomOut">Zoom −</button>
      <button class="btn secondary" data-cmd="zoomIn">Zoom +</button>
      <button class="btn secondary" data-cmd="slower">Slower</button>
      <button class="btn secondary" data-cmd="faster">Faster</button>
    </div>
    <p class="status" id="remoteStatus"></p>
  </div>

<script>
(function () {
  'use strict';

  const SONGS_PAGE = '/songs';
  const PDF_ROOT = '/pdfs/';
  const CHANNEL_NAME = 'souwest-tv-remote-v2';

  const params = new URLSearchParams(window.location.search);
  const isRemote = params.get('remote') === '1';

  const tvApp = document.getElementById('tvApp');
  const remoteApp = document.getElementById('remoteApp');

  const state = {
    songs: [],
    filteredSongs: [],
    currentIndex: 0,
    zoom: Number(localStorage.getItem('sw_tv_zoom') || 180),
    speed: Number(localStorage.getItem('sw_tv_speed') || 1),
    scrolling: false,
    pdfDoc: null,
    renderToken: 0,
    scrollRaf: null
  };

  const els = {
    error: document.getElementById('errorBox'),
    status: document.getElementById('statusBox'),
    search: document.getElementById('songSearch'),
    select: document.getElementById('songSelect'),
    load: document.getElementById('loadBtn'),
    refresh: document.getElementById('refreshBtn'),
    play: document.getElementById('playBtn'),
    top: document.getElementById('topBtn'),
    full: document.getElementById('fullBtn'),
    zoom: document.getElementById('zoomRange'),
    zoomLabel: document.getElementById('zoomLabel'),
    speed: document.getElementById('speedRange'),
    speedLabel: document.getElementById('speedLabel'),
    viewer: document.getElementById('viewer'),
    pages: document.getElementById('pages'),
    qr: document.getElementById('qr'),
    remoteUrlText: document.getElementById('remoteUrlText'),
    remoteStatus: document.getElementById('remoteStatus')
  };

  let channel = null;
  try {
    channel = new BroadcastChannel(CHANNEL_NAME);
  } catch (err) {
    channel = null;
  }

  if (isRemote) {
    startRemote();
  } else {
    startTv();
  }

  function startRemote() {
    document.body.classList.add('remote-mode');
    tvApp.classList.add('hide');
    remoteApp.classList.remove('hide');
    els.remoteStatus.textContent = 'Remote loaded. The TV page must be open in a browser on the display.';

    document.querySelectorAll('#remoteApp [data-cmd]').forEach(function (button) {
      button.addEventListener('click', function () {
        sendRemoteCommand(button.getAttribute('data-cmd'));
      });
    });
  }

  function sendRemoteCommand(cmd) {
    if (channel) {
      channel.postMessage({ type: 'remote-command', cmd: cmd, time: Date.now() });
      els.remoteStatus.textContent = 'Sent: ' + cmd;
    } else {
      els.remoteStatus.textContent = 'This browser does not support BroadcastChannel.';
    }
  }

  function startTv() {
    tvApp.classList.remove('hide');
    remoteApp.classList.add('hide');

    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    } else {
      showError('PDF.js did not load. Check internet/CDN access.');
    }

    els.zoom.value = state.zoom;
    els.speed.value = state.speed;
    updateLabels();
    wireControls();
    setupQr();
    setupRemoteListener();
    loadSongList();
  }

  function wireControls() {
    els.load.addEventListener('click', loadSelectedSong);
    els.refresh.addEventListener('click', loadSongList);
    els.play.addEventListener('click', toggleScroll);
    els.top.addEventListener('click', scrollTop);
    els.full.addEventListener('click', fullscreen);
    els.search.addEventListener('input', filterSongs);
    els.select.addEventListener('change', function () { state.currentIndex = els.select.selectedIndex; });
    els.zoom.addEventListener('input', function () {
      state.zoom = Number(els.zoom.value);
      localStorage.setItem('sw_tv_zoom', String(state.zoom));
      updateLabels();
      renderCurrentPdf();
    });
    els.speed.addEventListener('input', function () {
      state.speed = Number(els.speed.value);
      localStorage.setItem('sw_tv_speed', String(state.speed));
      updateLabels();
    });
  }

  function setupRemoteListener() {
    if (!channel) return;
    channel.onmessage = function (event) {
      const data = event.data || {};
      if (data.type !== 'remote-command') return;
      handleCommand(data.cmd);
    };
  }

  function setupQr() {
    const url = new URL(window.location.href);
    url.search = '?remote=1';
    els.remoteUrlText.textContent = url.toString();
    els.qr.innerHTML = '';

    if (typeof QRCode === 'undefined') {
      showError('QR library did not load. Remote URL is shown below the QR area instead.');
      return;
    }

    try {
      new QRCode(els.qr, {
        text: url.toString(),
        width: 144,
        height: 144,
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch (err) {
      showError('QR code failed to draw: ' + err.message);
    }
  }

  async function loadSongList() {
    clearError();
    setStatus('Loading songs from ' + SONGS_PAGE + ' ...');
    els.select.innerHTML = '<option>Loading songs...</option>';

    try {
      const res = await fetch(SONGS_PAGE, { cache: 'no-store' });
      if (!res.ok) throw new Error('Could not load /songs. HTTP ' + res.status);
      const html = await res.text();
      const songs = extractSongsFromHtml(html);
      if (!songs.length) {
        throw new Error('No PDF links were found on /songs. Check that the page contains links ending in .pdf or links to /pdfs/.');
      }
      state.songs = songs;
      state.filteredSongs = songs.slice();
      populateSelect(songs);
      setStatus('Found ' + songs.length + ' songs. Select one and press Load.');
      if (songs.length) loadSelectedSong();
    } catch (err) {
      showError(err.message);
      setStatus('Song list failed to load.');
      els.select.innerHTML = '<option>No songs found</option>';
    }
  }

  function extractSongsFromHtml(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const links = Array.from(doc.querySelectorAll('a[href]'));
    const found = [];
    const seen = new Set();

    links.forEach(function (link) {
      const hrefRaw = link.getAttribute('href') || '';
      const href = hrefRaw.trim();
      const isPdf = href.toLowerCase().includes('.pdf') || href.startsWith(PDF_ROOT);
      if (!isPdf) return;

      const absolute = new URL(href, window.location.origin).toString();
      if (seen.has(absolute)) return;
      seen.add(absolute);

      let title = (link.textContent || '').replace(/\s+/g, ' ').trim();
      if (!title) {
        const fileName = absolute.split('/').pop() || 'Song PDF';
        title = decodeURIComponent(fileName).replace(/\.pdf$/i, '').replace(/[-_]+/g, ' ');
      }
      found.push({ title: title, url: absolute });
    });

    found.sort(function (a, b) {
      return a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' });
    });
    return found;
  }

  function populateSelect(songs) {
    els.select.innerHTML = '';
    songs.forEach(function (song, index) {
      const option = document.createElement('option');
      option.value = song.url;
      option.textContent = song.title;
      option.dataset.index = String(index);
      els.select.appendChild(option);
    });
    state.currentIndex = 0;
  }

  function filterSongs() {
    const query = els.search.value.trim().toLowerCase();
    const filtered = query ? state.songs.filter(function (song) {
      return song.title.toLowerCase().includes(query);
    }) : state.songs.slice();
    state.filteredSongs = filtered;
    populateSelect(filtered);
    setStatus('Showing ' + filtered.length + ' of ' + state.songs.length + ' songs.');
  }

  async function loadSelectedSong() {
    const song = state.filteredSongs[els.select.selectedIndex];
    if (!song) return;
    state.currentIndex = els.select.selectedIndex;
    await loadPdf(song);
  }

  async function loadPdf(song) {
    clearError();
    stopScroll();
    setStatus('Loading: ' + song.title);
    els.pages.innerHTML = '';

    try {
      if (!window.pdfjsLib) throw new Error('PDF.js is not available.');
      state.pdfDoc = await pdfjsLib.getDocument(song.url).promise;
      await renderCurrentPdf();
      scrollTop();
      setStatus('Loaded: ' + song.title + ' (' + state.pdfDoc.numPages + ' page/s)');
    } catch (err) {
      showError('PDF failed to load:\n' + song.url + '\n\n' + err.message);
      setStatus('PDF failed to load.');
    }
  }

  async function renderCurrentPdf() {
    if (!state.pdfDoc) return;
    const token = ++state.renderToken;
    els.pages.innerHTML = '';
    const scale = state.zoom / 100;

    for (let pageNum = 1; pageNum <= state.pdfDoc.numPages; pageNum += 1) {
      if (token !== state.renderToken) return;
      const page = await state.pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: scale });
      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page';
      const context = canvas.getContext('2d');
      const outputScale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = Math.floor(viewport.width) + 'px';
      canvas.style.height = Math.floor(viewport.height) + 'px';
      context.setTransform(outputScale, 0, 0, outputScale, 0, 0);
      els.pages.appendChild(canvas);
      await page.render({ canvasContext: context, viewport: viewport }).promise;
    }
  }

  function toggleScroll() {
    if (state.scrolling) stopScroll();
    else startScroll();
  }

  function startScroll() {
    state.scrolling = true;
    els.play.textContent = 'Pause scroll';
    let last = performance.now();

    function step(now) {
      if (!state.scrolling) return;
      const elapsed = Math.min(50, now - last);
      last = now;
      els.viewer.scrollTop += state.speed * elapsed * 0.05;
      const bottom = els.viewer.scrollTop + els.viewer.clientHeight >= els.viewer.scrollHeight - 4;
      if (bottom) {
        stopScroll();
        return;
      }
      state.scrollRaf = requestAnimationFrame(step);
    }

    state.scrollRaf = requestAnimationFrame(step);
  }

  function stopScroll() {
    state.scrolling = false;
    els.play.textContent = 'Start scroll';
    if (state.scrollRaf) cancelAnimationFrame(state.scrollRaf);
    state.scrollRaf = null;
  }

  function scrollTop() {
    els.viewer.scrollTop = 0;
  }

  function fullscreen() {
    const target = document.documentElement;
    if (!document.fullscreenElement && target.requestFullscreen) target.requestFullscreen();
    else if (document.exitFullscreen) document.exitFullscreen();
  }

  function handleCommand(cmd) {
    if (cmd === 'toggle') toggleScroll();
    if (cmd === 'top') scrollTop();
    if (cmd === 'fullscreen') fullscreen();
    if (cmd === 'zoomIn') changeZoom(10);
    if (cmd === 'zoomOut') changeZoom(-10);
    if (cmd === 'faster') changeSpeed(0.2);
    if (cmd === 'slower') changeSpeed(-0.2);
    if (cmd === 'next') changeSong(1);
    if (cmd === 'prev') changeSong(-1);
  }

  function changeZoom(delta) {
    const min = Number(els.zoom.min);
    const max = Number(els.zoom.max);
    state.zoom = Math.max(min, Math.min(max, state.zoom + delta));
    els.zoom.value = state.zoom;
    localStorage.setItem('sw_tv_zoom', String(state.zoom));
    updateLabels();
    renderCurrentPdf();
  }

  function changeSpeed(delta) {
    const min = Number(els.speed.min);
    const max = Number(els.speed.max);
    state.speed = Math.max(min, Math.min(max, Number((state.speed + delta).toFixed(1))));
    els.speed.value = state.speed;
    localStorage.setItem('sw_tv_speed', String(state.speed));
    updateLabels();
  }

  function changeSong(delta) {
    if (!state.filteredSongs.length) return;
    let next = els.select.selectedIndex + delta;
    if (next < 0) next = state.filteredSongs.length - 1;
    if (next >= state.filteredSongs.length) next = 0;
    els.select.selectedIndex = next;
    loadSelectedSong();
  }

  function updateLabels() {
    els.zoomLabel.textContent = state.zoom + '%';
    els.speedLabel.textContent = state.speed.toFixed(1);
  }

  function setStatus(text) {
    els.status.textContent = text;
  }

  function showError(text) {
    els.error.textContent = text;
    els.error.classList.remove('hide');
    console.error(text);
  }

  function clearError() {
    els.error.textContent = '';
    els.error.classList.add('hide');
  }
})();
</script>
</body>
</html>
