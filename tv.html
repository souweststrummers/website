<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sou'West Strummers TV Songs</title>
<style>
  :root{--bg:#f6f3ea;--panel:#fffaf0;--ink:#18201b;--muted:#667064;--accent:#00625f;--line:#ded7c7;--danger:#b42318}
  *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{overflow:hidden}.topbar{position:fixed;z-index:50;top:0;left:0;right:0;background:rgba(255,250,240,.96);border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(0,0,0,.08);padding:10px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.brand{font-weight:800;font-size:18px;margin-right:8px;white-space:nowrap}.btn,select,input,textarea{border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font:inherit}.btn{padding:10px 14px;cursor:pointer;font-weight:700}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn:active{transform:translateY(1px)}select{padding:10px 36px 10px 12px;min-width:260px;max-width:35vw}input[type=range]{width:120px}.pill{font-size:13px;color:var(--muted);white-space:nowrap}.viewer{position:absolute;top:66px;left:0;right:0;bottom:0;overflow:auto;scroll-behavior:smooth;background:#242424;padding:22px 0 80px}.page{display:block;margin:0 auto 22px auto;background:#fff;box-shadow:0 8px 35px rgba(0,0,0,.45)}.empty{max-width:920px;margin:48px auto;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:26px;box-shadow:0 8px 25px rgba(0,0,0,.08)}.empty h1{margin-top:0}.empty textarea{width:100%;height:190px;padding:12px;margin:12px 0;font-family:ui-monospace,Consolas,monospace}.empty code{background:#eee6d7;padding:2px 6px;border-radius:6px}.remotePanel{position:fixed;z-index:80;right:16px;top:78px;width:310px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:16px;display:none}.remotePanel.show{display:block}.remotePanel h2{margin:0 0 8px 0;font-size:20px}.qrbox{display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;min-height:226px;margin:10px 0}.qrbox img{width:210px;height:210px}.small{font-size:13px;color:var(--muted);line-height:1.35}.remoteBody{padding:18px;max-width:560px;margin:0 auto}.remoteGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.remoteGrid .btn{font-size:18px;padding:18px 14px}.remoteTitle{font-size:24px;font-weight:800;margin:14px 0}.remoteStatus{padding:10px 12px;border-radius:12px;background:#fff;border:1px solid var(--line);margin:10px 0 18px}.hide{display:none!important}@media (max-width:800px){body{overflow:auto}.topbar{position:sticky}.viewer{position:relative;top:0;height:60vh}.brand{width:100%}select{max-width:none;width:100%}.remotePanel{position:static;width:auto;margin:10px 12px}.btn{padding:10px 12px}}
</style>
</head>
<body>
<div id="tvApp">
  <div class="topbar">
    <div class="brand">Sou'West Strummers TV</div>
    <button id="playBtn" class="btn primary">▶ Start</button>
    <button id="topBtn" class="btn">Top</button>
    <button id="prevBtn" class="btn">Previous</button>
    <button id="nextBtn" class="btn">Next</button>
    <select id="songSelect"><option>Loading songs…</option></select>
    <label class="pill">Zoom <span id="zoomLabel">185%</span> <input id="zoomRange" type="range" min="90" max="300" step="5" value="185"></label>
    <label class="pill">Speed <span id="speedLabel">18</span> px/s <input id="speedRange" type="range" min="2" max="80" step="1" value="18"></label>
    <button id="fullBtn" class="btn">Fullscreen</button>
    <button id="remoteBtn" class="btn">Remote</button>
    <span id="status" class="pill">Starting…</span>
  </div>
  <div id="viewer" class="viewer"></div>
  <div id="remotePanel" class="remotePanel">
    <h2>Phone remote</h2>
    <div class="small">Scan this on your phone. Keep this TV page open.</div>
    <div id="qr" class="qrbox"><div class="small">Starting remote…</div></div>
    <div id="remoteLink" class="small"></div>
  </div>
</div>
<div id="remoteApp" class="remoteBody hide">
  <div class="brand">Sou'West Strummers Remote</div>
  <div id="remoteStatus" class="remoteStatus">Connecting…</div>
  <div id="remoteSong" class="remoteTitle">Song</div>
  <div class="remoteGrid">
    <button class="btn primary" data-cmd="toggle">▶ Start / Pause</button>
    <button class="btn" data-cmd="top">Top</button>
    <button class="btn" data-cmd="prev">Previous</button>
    <button class="btn" data-cmd="next">Next</button>
    <button class="btn" data-cmd="zoomOut">Zoom −</button>
    <button class="btn" data-cmd="zoomIn">Zoom +</button>
    <button class="btn" data-cmd="slower">Slower</button>
    <button class="btn" data-cmd="faster">Faster</button>
    <button class="btn" data-cmd="fullscreen">TV Fullscreen</button>
    <button class="btn" data-cmd="reload">Reload TV</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
'use strict';
const SETTINGS_KEY='sws-tv-settings-v3', MANUAL_KEY='sws-tv-manual-songs-v1';
const isRemote=new URLSearchParams(location.search).has('remote');
const tvApp=document.getElementById('tvApp'), remoteApp=document.getElementById('remoteApp');
if(isRemote){ tvApp.classList.add('hide'); remoteApp.classList.remove('hide'); startRemote(); return; }
let songs=[], current=0, pdfDoc=null, rendering=false, playing=false, raf=0, last=0, conn=null;
const $=id=>document.getElementById(id);
const viewer=$('viewer'), select=$('songSelect'), status=$('status'), zoomRange=$('zoomRange'), speedRange=$('speedRange'), zoomLabel=$('zoomLabel'), speedLabel=$('speedLabel');
const settings=Object.assign({zoom:185,speed:18}, JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'));
zoomRange.value=settings.zoom; speedRange.value=settings.speed; labels();
if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
function save(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({zoom:+zoomRange.value,speed:+speedRange.value}))}
function labels(){zoomLabel.textContent=zoomRange.value+'%';speedLabel.textContent=speedRange.value}
function titleFromUrl(url){let f=url.split('/').pop().replace(/\.pdf(\?.*)?$/i,''); f=decodeURIComponent(f).replace(/[-_]+/g,' '); return f.replace(/^\s*(\d+)\s+/,'$1. ').replace(/\b\w/g,m=>m.toUpperCase())}
function abs(u){try{return new URL(u, location.origin).href}catch(e){return u}}
async function loadSongs(){
  status.textContent='Finding songs…';
  let found=[];
  // 1) Best method: load /songs in a hidden iframe so its own JavaScript can build the song list first.
  found = await scanSongsIframe();
  // 2) Fallback: raw fetch scan.
  if(!found.length) found = await scanSongsFetch();
  // 3) Fallback: user's saved/manual list.
  if(!found.length) found = loadManualSongs();
  songs=dedupe(found).sort((a,b)=>songNumber(a.title)-songNumber(b.title)||a.title.localeCompare(b.title));
  if(!songs.length){ showManualEntry(); return; }
  fillSelect(); status.textContent=songs.length+' songs found'; loadSong(0); startPeer();
}
function songNumber(t){let m=String(t).match(/^\s*(\d+)/); return m?+m[1]:99999}
function dedupe(arr){const m=new Map(); arr.forEach(s=>{if(s&&s.url&&/\.pdf(\?|$)/i.test(s.url))m.set(abs(s.url),{title:s.title||titleFromUrl(s.url),url:abs(s.url)})}); return [...m.values()]}
function scanSongsIframe(){return new Promise(resolve=>{
  const iframe=document.createElement('iframe'); iframe.src='/songs'; iframe.style.cssText='position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0'; document.body.appendChild(iframe);
  let done=false; const finish=(items)=>{if(done)return;done=true;iframe.remove();resolve(items||[])};
  iframe.onload=()=>{let tries=0; const timer=setInterval(()=>{tries++; try{
    const doc=iframe.contentDocument; const anchors=[...doc.querySelectorAll('a[href]')];
    const items=anchors.map(a=>({title:(a.textContent||a.getAttribute('aria-label')||'').trim()||titleFromUrl(a.href),url:a.getAttribute('href')})).filter(x=>/\/pdfs\/|\.pdf(\?|$)/i.test(x.url));
    if(items.length || tries>25){clearInterval(timer); finish(items)}
  }catch(e){clearInterval(timer); finish([])} },300); };
  setTimeout(()=>finish([]),9000);
})}
async function scanSongsFetch(){try{const r=await fetch('/songs',{cache:'no-store'}); const html=await r.text(); const doc=new DOMParser().parseFromString(html,'text/html'); return [...doc.querySelectorAll('a[href]')].map(a=>({title:a.textContent.trim()||titleFromUrl(a.href),url:a.getAttribute('href')})).filter(x=>/\/pdfs\/|\.pdf(\?|$)/i.test(x.url));}catch(e){return[]}}
function loadManualSongs(){return (localStorage.getItem(MANUAL_KEY)||'').split(/\n+/).map(line=>line.trim()).filter(Boolean).map(line=>{let parts=line.split('|'); let url=parts.pop().trim(); if(!/^https?:|^\//.test(url))url='/pdfs/'+url; return {title:(parts.join('|').trim()||titleFromUrl(url)),url};})}
function showManualEntry(){ viewer.innerHTML='<div class="empty"><h1>No songs found automatically</h1><p>The site may be blocking the hidden scan, or the song links may not be normal PDF links. Paste one PDF filename or URL per line. You can use either <code>1-All-I-Have-to-Do-Is-Dream.pdf</code> or <code>Song Title | /pdfs/song.pdf</code>.</p><textarea id="manualSongs" placeholder="1-All-I-Have-to-Do-Is-Dream.pdf\n2-All-Of-Me.pdf"></textarea><br><button class="btn primary" id="manualSave">Save song list</button></div>'; select.innerHTML='<option>No songs found</option>'; status.textContent='No automatic songs found'; startPeer(); document.getElementById('manualSave').onclick=()=>{localStorage.setItem(MANUAL_KEY,document.getElementById('manualSongs').value); loadSongs()}; }
function fillSelect(){select.innerHTML=songs.map((s,i)=>`<option value="${i}">${escapeHtml(s.title)}</option>`).join(''); select.value=current}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function loadSong(i){ if(!songs.length)return; current=(i+songs.length)%songs.length; select.value=current; viewer.scrollTop=0; viewer.innerHTML='<div class="empty"><h1>Loading…</h1><p>'+escapeHtml(songs[current].title)+'</p></div>'; broadcast(); try{ if(!window.pdfjsLib) throw new Error('PDF.js did not load'); pdfDoc=await pdfjsLib.getDocument(songs[current].url).promise; await renderAll(); }catch(e){viewer.innerHTML='<div class="empty"><h1>Could not load PDF</h1><p>'+escapeHtml(songs[current].title)+'</p><p class="small">'+escapeHtml(e.message||String(e))+'</p><p><a href="'+songs[current].url+'" target="_blank">Open PDF directly</a></p></div>'} }
async function renderAll(){ if(rendering||!pdfDoc)return; rendering=true; viewer.innerHTML=''; const scale=+zoomRange.value/100; for(let p=1;p<=pdfDoc.numPages;p++){ const page=await pdfDoc.getPage(p); const vp=page.getViewport({scale}); const canvas=document.createElement('canvas'); canvas.className='page'; canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height); viewer.appendChild(canvas); await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise; } rendering=false; }
function playToggle(){playing=!playing; $('playBtn').textContent=playing?'⏸ Pause':'▶ Start'; if(playing){last=performance.now(); raf=requestAnimationFrame(tick)} else cancelAnimationFrame(raf); broadcast()}
function tick(now){ if(!playing)return; const dt=(now-last)/1000; last=now; viewer.scrollTop += (+speedRange.value)*dt; if(viewer.scrollTop + viewer.clientHeight >= viewer.scrollHeight-4){playing=false; $('playBtn').textContent='▶ Start'; broadcast(); return;} raf=requestAnimationFrame(tick)}
function top(){viewer.scrollTo({top:0,behavior:'smooth'})}
function next(){loadSong(current+1)} function prev(){loadSong(current-1)}
$('playBtn').onclick=playToggle; $('topBtn').onclick=top; $('nextBtn').onclick=next; $('prevBtn').onclick=prev; select.onchange=e=>loadSong(+e.target.value); $('fullBtn').onclick=()=>document.documentElement.requestFullscreen?.(); $('remoteBtn').onclick=()=>$('remotePanel').classList.toggle('show');
zoomRange.oninput=()=>{labels();save()}; zoomRange.onchange=()=>{renderAll();broadcast()}; speedRange.oninput=()=>{labels();save();broadcast()};
function command(cmd){ if(cmd==='toggle')playToggle(); if(cmd==='top')top(); if(cmd==='next')next(); if(cmd==='prev')prev(); if(cmd==='zoomIn'){zoomRange.value=Math.min(300,+zoomRange.value+10);labels();save();renderAll()} if(cmd==='zoomOut'){zoomRange.value=Math.max(90,+zoomRange.value-10);labels();save();renderAll()} if(cmd==='faster'){speedRange.value=Math.min(80,+speedRange.value+4);labels();save()} if(cmd==='slower'){speedRange.value=Math.max(2,+speedRange.value-4);labels();save()} if(cmd==='fullscreen')document.documentElement.requestFullscreen?.(); if(cmd==='reload')location.reload(); broadcast(); }
function startPeer(){ const qr=$('qr'), link=$('remoteLink'); if(!window.Peer){qr.innerHTML='<div class="small">Remote library did not load. The TV viewer still works.</div>'; return;} const id='sws-tv-'+Math.random().toString(36).slice(2,8); const peer=new Peer(id,{debug:0}); peer.on('open',()=>{ const url=location.origin+location.pathname+'?remote='+encodeURIComponent(id); const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=420x420&margin=12&data='+encodeURIComponent(url); qr.innerHTML='<img alt="Remote QR code" src="'+qrUrl+'">'; link.innerHTML='<b>Remote link:</b><br><a href="'+url+'">'+url+'</a>'; }); peer.on('connection',c=>{conn=c; status.textContent='Remote connected'; c.on('data',d=>{ if(d&&d.cmd)command(d.cmd); }); c.on('open',broadcast); c.on('close',()=>{status.textContent='Remote disconnected'}); }); peer.on('error',e=>{qr.innerHTML='<div class="small">Remote connection failed: '+escapeHtml(e.message||String(e))+'</div>';}); }
function broadcast(){ if(conn&&conn.open){conn.send({type:'state',song:songs[current]?.title||'No song',playing,zoom:+zoomRange.value,speed:+speedRange.value})} }
loadSongs();
})();
function startRemote(){ const params=new URLSearchParams(location.search); const target=params.get('remote'); const status=document.getElementById('remoteStatus'), title=document.getElementById('remoteSong'); let conn=null; function set(s){status.textContent=s} if(!window.Peer){set('Remote library did not load.');return} const peer=new Peer(null,{debug:0}); peer.on('open',()=>{set('Connecting to TV…'); conn=peer.connect(target); conn.on('open',()=>set('Connected to TV')); conn.on('data',d=>{if(d&&d.type==='state'){title.textContent=d.song||'Song'; set((d.playing?'Playing':'Paused')+' · Zoom '+d.zoom+'% · Speed '+d.speed+' px/s')}}); conn.on('close',()=>set('Disconnected. Re-scan the QR code.')); conn.on('error',e=>set('Connection error: '+(e.message||e))); }); document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{ if(conn&&conn.open)conn.send({cmd:b.dataset.cmd}); else set('Not connected to TV'); }); }
})();
</script>
</body>
</html>
