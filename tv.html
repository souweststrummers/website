<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>Sou'West Strummers TV</title>
<style>
/* ── Tokens ── */
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --ink: #1f2933;
  --muted: #ababab;
  --accent: #0f172a;
  --accent2: #555;
  --line: #e2e8f0;
  --danger: #dc2626;
  --shadow: 0 20px 45px rgba(15,23,42,.12);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: 'Noto Sans', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
button, input { font: inherit; }
.hide { display: none !important; }

/* ── Site banner ── */
.sws-banner {
  width: 100%;
  height: 190px;
  background: url('/assets/banner.png') no-repeat center center;
  background-size: cover;
  cursor: default;
}

/* ── Pair / landing screen ── */
.pair {
  min-height: 60vh;
  display: grid;
  place-items: center;
  padding: 32px 20px;
  background: var(--bg);
}
.pairCard {
  width: min(680px, 96vw);
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 36px 32px 32px;
  box-shadow: var(--shadow);
  text-align: center;
}
.pairCard h1 { margin: 0 0 6px; font-size: clamp(28px,4.5vw,50px); color: #0b1320; line-height: 1; }
.pairCard .sub { color: var(--muted); font-size: clamp(14px,1.8vw,18px); margin: 0 0 4px; }
.qr {
  width: min(55vw, 360px);
  height: min(55vw, 360px);
  display: block;
  margin: 22px auto;
  border: 12px solid #fff;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 10px 30px rgba(15,23,42,.2);
}
.status-box {
  margin-top: 14px;
  padding: 11px 14px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px;
  color: var(--muted);
  font-size: 13px;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  text-align: left;
  line-height: 1.5;
}
.status-box.err { color: var(--danger); border-color: #f3b9b4; background: #fff1ef; }

/* ── TV stage ── */
.tvStage {
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: #1e1e1e;
  cursor: pointer;
  -webkit-overflow-scrolling: touch;
}
.fs-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  color: #999;
  font-size: 15px;
  font-weight: 400;
  pointer-events: none;
  white-space: nowrap;
}
#pages {
  display: grid;
  gap: 16px;
  justify-items: center;
  padding: 65px 0 60vh;
}
.page { display: block; background: #fff; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
.tv-empty {
  max-width: 820px;
  margin: 80px auto 40px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 28px 24px;
  box-shadow: var(--shadow);
  text-align: center;
}
.tv-empty h2 { margin: 0 0 8px; color: #0b1320; }
.tv-empty p { color: var(--muted); margin: 0 0 6px; }
.tv-empty a { color: #000; font-weight: 600; }

/* ── Remote ── */
body.remote { background: var(--bg); overflow: auto; }
.remoteWrap { padding: 16px 14px 40px; max-width: 580px; margin: 0 auto; }
.remotePanel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.remotePanel h2 { margin: 0 0 2px; font-size: 20px; color: #0b1320; }
.panel-sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
.rStatus {
  padding: 10px 13px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 14px;
  line-height: 1.4;
}
.rStatus.playing { border-color: #1d4ed8; color: #1d4ed8; background: rgba(29,78,216,.05); }
/* Search */
.searchWrap { position: relative; margin-bottom: 10px; }
.searchWrap input[type=search] {
  width: 100%;
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 13px 42px 13px 14px;
  background: #fff;
  color: var(--ink);
  font-size: 16px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.searchWrap input:focus { box-shadow: 0 0 0 3px rgba(15,23,42,.1); }
.clearBtn {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px; line-height: 1; display: none;
}
/* Search results */
.songList { display: grid; gap: 6px; max-height: 44vh; overflow-y: auto; overflow-x: hidden; margin-bottom: 12px; }
.searchHint { text-align: center; color: var(--muted); padding: 18px 12px; font-size: 14px; }
.songBtn {
  text-align: left;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 12px;
  padding: 11px 13px;
  cursor: pointer;
  transition: border-color .1s, box-shadow .1s;
  width: 100%;
}
.songBtn:active { transform: scale(.99); }
.songBtn.active { border-color: #1d4ed8; background: rgba(29,78,216,.04); box-shadow: 0 0 0 2px rgba(29,78,216,.18); }
.s-title { font-weight: 700; color: var(--ink); font-size: 14.5px; line-height: 1.2; }
.s-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
/* Now playing */
.nowPlaying {
  border: 1px solid rgba(29,78,216,.25);
  background: rgba(29,78,216,.06);
  border-radius: 13px;
  padding: 10px 13px;
  margin-bottom: 12px;
}
.np-label { font-size: 10px; font-weight: 800; color: #1d4ed8; text-transform: uppercase; letter-spacing: .07em; }
.np-name { font-weight: 700; color: var(--ink); font-size: 14px; margin-top: 1px; }
/* Control buttons */
.divider { height: 1px; background: var(--line); margin: 14px 0; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  color: var(--ink);
  font-weight: 700;
  padding: 13px 8px;
  cursor: pointer;
  font-size: 13.5px;
  line-height: 1.2;
  transition: transform .08s, background .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: translateY(1px) scale(.99); background: var(--bg); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:active { background: var(--accent2); }
.btn.wide { grid-column: 1 / -1; font-size: 17px; padding: 17px 8px; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function () {
'use strict';

/* ── Config ── */
const DATA_PATH  = '/assets/songs-data.js';
const SETTINGS_KEY = 'sws-tv-v3';

/* ── Shared state ── */
const state = {
  songs:        [],   // [{title,artist,genre,url}]
  current:      0,
  zoom:         1.85,
  speed:        18,
  pdf:          null,
  playing:      false,
  raf:          0,
  last:         0,
  renderToken:  0,
  peer:         null,
  conn:         null,
  // Remote-side only
  remoteSongs:  [],
  remoteCurrent: 0,
};

try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
      if (typeof s.zoom === 'number') state.zoom = s.zoom;
      if (typeof s.speed === 'number') state.speed = s.speed; } catch (_) {}

/* ── Helpers ── */
const $    = id => document.getElementById(id);
const esc  = s  => String(s ?? '').replace(/[&<>"']/g, c =>
             ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const abs  = p  => new URL(p, location.origin).href;
const save = () => localStorage.setItem(SETTINGS_KEY, JSON.stringify({zoom: state.zoom, speed: state.speed}));

/* ── Site nav snippet ── */
const NAV = `<div class="sws-banner"></div>`;

/* ── Route ── */
const isRemote = new URLSearchParams(location.search).has('remote');
if (isRemote) { bootRemote(); } else { bootTv(); }

/* ════════════════════════════════════════
   TV SIDE
═══════════════════════════════════════ */
function bootTv() {
  document.body.className = 'tv';
  document.getElementById('app').innerHTML = `
    <div id="pairScreen">
      ${NAV}
      <section class="pair">
        <div class="pairCard">
          <p class="sub">TV Ready for Pairing</p>
          <img id="qrImg" class="qr" alt="Remote QR code">
          <div id="tvStatus" class="status-box">Starting…</div>
        </div>
      </section>
    </div>
    <main id="stage" class="tvStage hide">
      <div id="pages"><div class="tv-empty"><h2>Waiting for song…</h2></div></div>
      <div id="fsHint" class="fs-hint">Tap for Full Screen</div>
    </main>`;

  // Tap the TV stage → fullscreen
  $('stage').addEventListener('click', () => tryFullscreen());

  if (!window.pdfjsLib) { tvStatus('PDF.js failed to load.', true); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Show temp QR while peer boots
  setQr(location.origin + location.pathname + '?remote=manual');
  setupPeer();

  loadSongs()
    .then(() => { tvStatus('Songs loaded. Scan QR to connect remote.', false); return loadSong(0, true); })
    .then(() => sendSongs())
    .catch(e => tvStatus(e.message, true));
}

function tvStatus(msg, err) {
  const el = $('tvStatus'); if (!el) return;
  el.textContent = msg;
  el.className = 'status-box' + (err ? ' err' : '');
}

function setQr(url) {
  const img = $('qrImg'); if (!img) return;
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=12&data=' +
            encodeURIComponent(url);
  img.onerror = () => tvStatus('QR failed. Open on your phone:\n' + url, true);
}

function setupPeer() {
  if (!window.Peer) { tvStatus('PeerJS failed to load.', true); return; }
  const peerId = 'sws-tv-' + Math.random().toString(36).slice(2, 9);
  const peer = new Peer(peerId, { debug: 0 });
  state.peer = peer;

  peer.on('open', id => {
    const url = location.origin + location.pathname + '?remote=' + encodeURIComponent(id);
    setQr(url);
    tvStatus('Scan the QR code with your phone.\n\n' + url, false);
  });

  peer.on('connection', c => {
    state.conn = c;
    tvStatus('Remote connected.', false);
    showStage();
    c.on('open',  () => { sendSongs(); sendTvState(); });
    c.on('data',  handleTvCommand);
    c.on('close', () => tvStatus('Remote disconnected.\nRefresh this page to show a new QR code.', true));
    c.on('error', e => tvStatus('Connection error: ' + (e.message || e), true));
  });

  peer.on('error', e => tvStatus('Peer error: ' + (e.message || e.type || e), true));
}

function showStage() {
  const pair = $('pairScreen'), stage = $('stage');
  if (pair)  pair.classList.add('hide');
  if (stage) stage.classList.remove('hide');
}

function tryFullscreen() {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen?.().catch(() => {});
}

/* ── Song loading ── */
async function loadSongs() {
  const r = await fetch(DATA_PATH + '?v=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('Could not load songs-data.js (HTTP ' + r.status + ')');
  const text = await r.text();
  // Extract the JSON array between first [ and last ]
  const start = text.indexOf('[');
  const end   = text.lastIndexOf(']') + 1;
  if (start < 0 || end <= start) throw new Error('Could not parse songs-data.js — unexpected format');
  const arr = JSON.parse(text.slice(start, end));
  if (!Array.isArray(arr) || !arr.length) throw new Error('songs-data.js contained no songs');
  state.songs = arr.map(s => ({
    number: s.number || '',
    title:  s.title  || '',
    artist: s.artist || '',
    genre:  s.genre  || '',
    url:    abs(s.pdf.startsWith('/') ? s.pdf : '/' + s.pdf),
  }));
}

/* ── PDF load & render ── */
async function loadSong(idx, keepHidden) {
  if (!state.songs.length) return;
  state.current = ((idx % state.songs.length) + state.songs.length) % state.songs.length;
  const song = state.songs[state.current];
  const pages = $('pages');
  if (!keepHidden) showStage();
  stopScroll(false);
  state.renderToken++;
  const token = state.renderToken;
  if (pages) pages.innerHTML = `<div class="tv-empty"><h2>Loading…</h2><p>${esc(song.title)}</p></div>`;
  try {
    const pdf = await pdfjsLib.getDocument(song.url).promise;
    if (token !== state.renderToken) return;
    state.pdf = pdf;
    await renderPages(token);
  } catch (e) {
    if (token !== state.renderToken) return;
    if (pages) pages.innerHTML = `<div class="tv-empty"><h2>Could not load PDF</h2>
      <p>${esc(song.title)}</p>
      <p style="color:var(--danger)">${esc(e.message || String(e))}</p>
      <p><a href="${esc(song.url)}" target="_blank">Open PDF directly ↗</a></p></div>`;
  }
  const stage = $('stage'); if (stage) stage.scrollTop = 0;
  sendTvState();
}

async function renderPages(token) {
  const pages = $('pages'); if (!state.pdf || !pages) return;
  pages.innerHTML = '';
  for (let p = 1; p <= state.pdf.numPages; p++) {
    if (token !== state.renderToken) return;
    const page = await state.pdf.getPage(p);
    const vp = page.getViewport({ scale: state.zoom });
    const canvas = document.createElement('canvas');
    canvas.className = 'page';
    canvas.width  = Math.floor(vp.width);
    canvas.height = Math.floor(vp.height);
    pages.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }
}

/* ── Scroll playback ── */
function playScroll() {
  if (state.playing) return;
  const stage = $('stage');
  if (!stage) return;
  // Only check if there's content to scroll - be permissive
  if (stage.scrollHeight <= stage.clientHeight + 5) return;
  state.playing = true;
  state.last = performance.now();
  state.raf  = requestAnimationFrame(tick);
  sendTvState();
}

function stopScroll(notify = true) {
  state.playing = false;
  cancelAnimationFrame(state.raf);
  if (notify) sendTvState();
}

function toggle() { state.playing ? stopScroll() : playScroll(); }

function tick(now) {
  if (!state.playing) return;
  const stage = $('stage');
  if (!stage) { stopScroll(); return; }
  const dt = (now - state.last) / 1000;
  state.last = now;
  stage.scrollTop += state.speed * dt;
  // Stop when we reach the bottom
  const atBottom = stage.scrollTop + stage.clientHeight >= stage.scrollHeight - 4;
  if (atBottom) {
    stopScroll();
    return;
  }
  state.raf = requestAnimationFrame(tick);
}

function topSong() {
  const s = $('stage');
  if (s) s.scrollTo({ top: 0, behavior: 'smooth' });
}

function commandZoom(delta) {
  state.zoom = Math.max(0.8, Math.min(3.5, state.zoom + delta));
  save();
  state.renderToken++;
  renderPages(state.renderToken);
  sendTvState();
}
function commandSpeed(delta) {
  state.speed = Math.max(2, Math.min(100, state.speed + delta));
  save();
  sendTvState();
}

/* ── PeerJS messaging (TV side) ── */
function sendSongs() {
  if (!state.conn?.open) return;
  state.conn.send({
    type:    'songs',
    songs:   state.songs.map((s, i) => ({ index: i, number: s.number, title: s.title, artist: s.artist, genre: s.genre })),
    current: state.current,
  });
}
function sendTvState() {
  if (!state.conn?.open) return;
  state.conn.send({
    type:    'state',
    current: state.current,
    song:    state.songs[state.current]?.title || '',
    playing: state.playing,
    zoom:    Math.round(state.zoom * 100),
    speed:   state.speed,
  });
}
function handleTvCommand(d) {
  if (!d || typeof d !== 'object') return;
  switch (d.cmd) {
    case 'hello':      sendSongs(); sendTvState(); break;
    case 'select':     loadSong(Number(d.value) || 0); break;
    case 'toggle':     toggle(); break;
    case 'top':        topSong(); break;
    case 'next':       loadSong(state.current + 1); break;
    case 'prev':       loadSong(state.current - 1); break;
    case 'zoomIn':     commandZoom(+0.15); break;
    case 'zoomOut':    commandZoom(-0.15); break;
    case 'faster':     commandSpeed(+5); break;
    case 'slower':     commandSpeed(-5); break;
  }
}

/* ════════════════════════════════════════
   REMOTE SIDE
═══════════════════════════════════════ */
function bootRemote() {
  document.body.className = 'remote';
  document.getElementById('app').innerHTML = `
    <div class="remoteWrap">
      <div class="remotePanel">
        <h2>TV Remote</h2>
        <p class="panel-sub">Search for a song and tap it to show on the TV</p>
        <div id="rStatus" class="rStatus">Connecting to TV…</div>

        <div class="searchWrap">
          <input id="search" type="search" placeholder="Search songs, artist, genre…"
                 autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
          <button class="clearBtn" id="clearBtn" aria-label="Clear search">✕</button>
        </div>

        <div id="nowPlaying" class="hide"></div>
        <div id="songList"></div>

        <div class="divider"></div>

        <div class="grid">
          <button class="btn primary wide" id="toggleBtn">Play / Pause</button>
          <button class="btn" id="prevBtn">Prev song</button>
          <button class="btn" id="nextBtn">Next song</button>
          <button class="btn" id="zoomOutBtn">Zoom out</button>
          <button class="btn" id="zoomInBtn">Zoom in</button>
          <button class="btn" id="slowerBtn">Slower</button>
          <button class="btn" id="fasterBtn">Faster</button>
        </div>
      </div>
    </div>`;

  // Wire up controls
  $('search').addEventListener('input', renderSongList);
  $('clearBtn').addEventListener('click', () => { $('search').value = ''; renderSongList(); $('search').focus(); });
  $('toggleBtn').addEventListener('click', () => sendCmd('toggle'));
  $('topBtn').addEventListener('click',    () => sendCmd('top'));
  $('prevBtn').addEventListener('click',   () => sendCmd('prev'));
  $('nextBtn').addEventListener('click',   () => sendCmd('next'));
  $('zoomOutBtn').addEventListener('click',() => sendCmd('zoomOut'));
  $('zoomInBtn').addEventListener('click', () => sendCmd('zoomIn'));
  $('slowerBtn').addEventListener('click', () => sendCmd('slower'));
  $('fasterBtn').addEventListener('click', () => sendCmd('faster'));

  renderSongList(); // show initial hint
  startRemotePeer();
}

function startRemotePeer() {
  const target = new URLSearchParams(location.search).get('remote');
  const statusEl = $('rStatus');
  if (!target || target === 'manual') {
    statusEl.textContent = 'TV is not ready yet — refresh the TV page and re-scan the QR.';
    return;
  }
  if (!window.Peer) { statusEl.textContent = 'PeerJS library failed to load.'; return; }

  const peer = new Peer(null, { debug: 0 });
  state.peer = peer;

  peer.on('open', () => {
    const conn = peer.connect(target, { reliable: true });
    state.conn = conn;
    conn.on('open',  () => { setRStatus('Connected — loading songs…', false); sendCmd('hello'); });
    conn.on('data',  handleRemoteData);
    conn.on('close', () => setRStatus('Disconnected — re-scan the QR code', false));
    conn.on('error', e  => setRStatus('Connection error: ' + (e.message || e), false));
  });
  peer.on('error', e => setRStatus('Peer error: ' + (e.message || e.type || e), false));
}

function setRStatus(msg, playing) {
  const el = $('rStatus'); if (!el) return;
  el.textContent = msg;
  el.className = 'rStatus' + (playing ? ' playing' : '');
}

function sendCmd(cmd, value) {
  if (state.conn?.open) state.conn.send({ cmd, value });
  else setRStatus('Not connected to TV.', false);
}

function handleRemoteData(d) {
  if (!d || typeof d !== 'object') return;

  if (d.type === 'songs') {
    state.remoteSongs   = Array.isArray(d.songs) ? d.songs : [];
    state.remoteCurrent = Number(d.current || 0);
    setRStatus('Connected · ' + state.remoteSongs.length + ' songs', false);
    renderSongList();
  }

  if (d.type === 'state') {
    state.remoteCurrent = Number(d.current || 0);
    const playing = Boolean(d.playing);
    setRStatus((playing ? 'Playing: ' : 'Paused: ') + (d.song || '—'), playing);
    const tb = $('toggleBtn');
    if (tb) tb.textContent = playing ? 'Pause' : 'Play';
    // Update "now playing" banner
    const np = $('nowPlaying');
    if (np && d.song) {
      np.className = 'nowPlaying';
      np.innerHTML = `<div class="np-label">Now on TV</div><div class="np-name">${esc(d.song)}</div>`;
    } else if (np) np.classList.add('hide');
    renderSongList(); // refresh active state
  }
}

function renderSongList() {
  const list = $('songList'), input = $('search');
  if (!list) return;
  const q = (input?.value || '').trim().toLowerCase();
  const clearBtn = $('clearBtn');
  if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';

  if (!q) {
    const count = state.remoteSongs.length;
    list.innerHTML = `<div class="searchHint">${
      count ? 'Type to search ' + count + ' songs' : 'Waiting for TV to connect…'
    }</div>`;
    return;
  }

  const matches = state.remoteSongs.filter(s =>
    (s.number || '').toLowerCase().includes(q) ||
    s.title.toLowerCase().includes(q) ||
    (s.artist || '').toLowerCase().includes(q) ||
    (s.genre  || '').toLowerCase().includes(q)
  ).slice(0, 60);

  if (!matches.length) {
    list.innerHTML = `<div class="searchHint">No songs found for "<strong>${esc(q)}</strong>"</div>`;
    return;
  }

  list.innerHTML = '';
  matches.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'songBtn' + (s.index === state.remoteCurrent ? ' active' : '');
    btn.innerHTML = `<div class="s-title">${esc(s.number || '')} ${esc(s.title)}</div>
      <div class="s-meta">${esc(s.artist)}${s.genre ? ' · ' + esc(s.genre) : ''}</div>`;
    btn.addEventListener('click', () => {
      sendCmd('select', s.index);
      // Clear search after selecting
      if (input) input.value = '';
      renderSongList();
    });
    list.appendChild(btn);
  });
}

})();
</script>
</body>
</html>
